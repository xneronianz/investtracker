name: Update NAV Data

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 8am Bangkok (UTC+7) Mon-Fri
  workflow_dispatch:

jobs:
  update-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch NAV data from SEC Thailand
        env:
          SEC_KEY_DAILYINFO: ${{ secrets.SEC_KEY_DAILYINFO }}
        run: node fetch-nav.js
      - name: Commit and push nav-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav-data.json
          git diff --staged --quiet || git commit -m "Update NAV data $(date +'%Y-%m-%d')"
          git push
