name: Update NAV Data

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 9pm Bangkok (UTC+7) Mon-Fri
  workflow_dispatch:
    inputs:
      mode:
        description: 'nav=update NAV | probe=find missing proj_ids'
        required: false
        default: 'nav'

jobs:
  update-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Probe missing proj_ids
        if: github.event.inputs.mode == 'probe'
        env:
          SEC_KEY_DAILYINFO: ${{ secrets.SEC_KEY_DAILYINFO }}
          SEC_KEY_FACTSHEET: ${{ secrets.SEC_KEY_FACTSHEET }}
        run: node probe-projids.js

      - name: Fetch NAV data
        if: github.event.inputs.mode != 'probe'
        env:
          SEC_KEY_DAILYINFO: ${{ secrets.SEC_KEY_DAILYINFO }}
        run: node fetch-nav.js

      - name: Commit nav-data.json
        if: github.event.inputs.mode != 'probe'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav-data.json
          git diff --staged --quiet || git commit -m "Update NAV data $(date +'%Y-%m-%d')"
          git push
