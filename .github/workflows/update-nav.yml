name: Update NAV Data

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 8am Bangkok (UTC+7) Mon-Fri
  workflow_dispatch:
    inputs:
      mode:
        description: 'nav=update | find=missing | uob=UOB | scb=SCB | ssf=all SSF funds'
        required: false
        default: 'nav'

jobs:
  update-nav:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find missing funds
        if: github.event.inputs.mode == 'find'
        env:
          SEC_KEY_FACTSHEET: ${{ secrets.SEC_KEY_FACTSHEET }}
        run: node find-missing-funds.js

      - name: Find UOB funds
        if: github.event.inputs.mode == 'uob'
        env:
          SEC_KEY_FACTSHEET: ${{ secrets.SEC_KEY_FACTSHEET }}
        run: node find-uob-fund.js

      - name: Find SCB funds
        if: github.event.inputs.mode == 'scb'
        env:
          SEC_KEY_FACTSHEET: ${{ secrets.SEC_KEY_FACTSHEET }}
        run: node find-scb-funds.js

      - name: Find SSF funds
        if: github.event.inputs.mode == 'ssf'
        env:
          SEC_KEY_FACTSHEET: ${{ secrets.SEC_KEY_FACTSHEET }}
        run: node find-ssf-funds.js

      - name: Fetch NAV data from SEC Thailand
        if: github.event.inputs.mode == 'nav' || github.event.inputs.mode == ''
        env:
          SEC_KEY_DAILYINFO: ${{ secrets.SEC_KEY_DAILYINFO }}
        run: node fetch-nav.js

      - name: Commit and push nav-data.json
        if: github.event.inputs.mode == 'nav' || github.event.inputs.mode == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nav-data.json
          git diff --staged --quiet || git commit -m "Update NAV data $(date +'%Y-%m-%d')"
          git push
